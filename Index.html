<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #020617; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { cursor: crosshair; }
        .ui-panel { position: absolute; bottom: 40px; text-align: center; color: #00e5ff; font-family: 'Courier New', monospace; }
        input[type=range] { width: 60vw; accent-color: #00e5ff; }
    </style>
</head>
<body>
    <canvas id="waveCanvas"></canvas>
    <div class="ui-panel">
        <p>TRANSIENT_FREQUENCY: <span id="freqVal">25</span> Hz</p>
        <input type="range" id="freqSlider" min="1" max="50" step="0.5" value="25">
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('freqSlider');
        const freqVal = document.getElementById('freqVal');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            const val = parseFloat(slider.value);
            freqVal.innerText = val.toFixed(1);
            
            // 根據數值調整波紋的物理特性
            // 25Hz 時產生最強干涉，1Hz 最弱，50Hz 趨於高頻紊亂
            const time = Date.now() * 0.005;
            const waveDensity = val * 0.08; 
            const source1 = { x: canvas.width * 0.4, y: canvas.height / 2 };
            const source2 = { x: canvas.width * 0.6, y: canvas.height / 2 };

            const imageData = ctx.createImageData(canvas.width, canvas.height);
            const data = imageData.data;

            for (let x = 0; x < canvas.width; x += 2) {
                for (let y = 0; y < canvas.height; y += 2) {
                    const d1 = Math.sqrt((x - source1.x)**2 + (y - source1.y)**2);
                    const d2 = Math.sqrt((x - source2.x)**2 + (y - source2.y)**2);
                    
                    // 核心邏輯：波紋疊加
                    const wave = Math.sin(d1 * waveDensity - time * 5) + Math.sin(d2 * waveDensity - time * 5);
                    
                    // 當 val 接近 25 時，強化對比度；超過 25 則引入隨機性模擬崩解
                    const chaos = val > 25 ? (val - 25) * 0.1 : 0;
                    const intensity = (wave + 2) * (50 + chaos * 20);
                    
                    const index = (y * canvas.width + x) * 4;
                    data[index] = chaos * 50;          // R: 隨頻率增加轉紅
                    data[index + 1] = intensity * 0.8; // G
                    data[index + 2] = 255 - chaos * 50; // B
                    data[index + 3] = 255;
                }
            }
            ctx.putImageData(imageData, 0, 0);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
